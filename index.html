<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels Project</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    
    <main>
        <section>
            <div class="reels-container">
                <div class="reel">
                    <video src="./videos/video_1.mp4" autoplay muted loop></video>
                    <div class="mute"><i class="ri-volume-mute-fill"></i></div>
                    <div class="play"><i class="ri-play-large-fill"></i></div>
                    <div class="bottom">
                        <div class="user">
                            <img src="https://media.licdn.com/dms/image/v2/D4E03AQG_MBh8PQRPeA/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1710414177035?e=1775692800&v=beta&t=f4_6rQkhzIjpxYQ3hGHbWh9MlMxoziLtMY3kmL07Fmc" alt="" class="user-image">
                            <h4>Shadab Irfan</h4>
                            <button>Follow</button>
                        </div>
                        <h3>Tyrion waited his whole life for this🔥😏<span>#lannister #got</span></h3>
                    </div>
                    <div class="right">
                        <div class="like">
                            <h4 class="like-icon icon"><i class="ri-heart-line"></i></h4>
                            <h6>200</h6>
                        </div>
                        <div class="comment">
                            <h4 class="comment-icon icon"><i class="ri-chat-3-line"></i></h4>
                            <h6>50</h6>
                        </div>
                        <div class="share">
                            <h4 class="share-icon icon"><i class="ri-share-forward-line"></i></h4>
                            <h6>88</h6>
                        </div>
                        <div class="save">
                            <h4 class="save-icon icon"><i class="ri-bookmark-line"></i></h4>
                            <h6>5</h6>
                        </div>
                        <div class="menu">
                            <h4 class="menu-icon icon"><i class="ri-more-2-line"></i></h4>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
